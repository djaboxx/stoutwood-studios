name: weekly-content
on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 13:00 UTC
  workflow_dispatch:
    inputs:
      pillar:
        description: 'Pillar slug from brand.json'
        required: true
      platform:
        description: 'Platform (instagram, linkedin, ...)'
        required: true
        default: 'instagram'
      days:
        description: 'How many days of posts'
        required: false
        default: '7'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Generate weekly content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_content.py weekly \
            --platform "${{ github.event.inputs.platform || 'instagram' }}" \
            --pillar "${{ github.event.inputs.pillar || 'breath-and-regulation' }}" \
            --days "${{ github.event.inputs.days || '7' }}"
      - name: Commit drafts
        run: |
          git config user.name "brand-manager[bot]"
          git config user.email "brand-manager@users.noreply.github.com"
          git add content/
          git diff --cached --quiet || git commit -m "weekly content: $(date -u +%Y-%m-%d)"
          git push
